version: '3.7'
name: docker-production-wordpress

volumes:
  vol-wp-content:
  vol-wp-images:
  vol-wp-db:

networks:
  backend:

services:

  traefik:
    image: traefik:2.10
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web-secure.address=:443"
      - "--certificatesresolvers.myhttpchallenge.acme.httpchallenge=true"
      - "--certificatesresolvers.myhttpchallenge.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myhttpchallenge.acme.caserver=${LETSENCRYPT_CA_SERVER}"
      - "--certificatesresolvers.myhttpchallenge.acme.email=${LETSENCRYPT_EMAIL}"
      - "--certificatesresolvers.myhttpchallenge.acme.storage=/letsencrypt/acme.json"
    volumes:
      - "./letsencrypt:/letsencrypt"
      - /var/run/docker.sock:/var/run/docker.sock:ro

  db:
    build:
      context: ./
      dockerfile: mariadb.Dockerfile
    image: wordpress-mariadb:latest
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    env_file:
      - .env
    # Apple container-compose needs the DB exposed on the host for WordPress connectivity.
    ports:
      - "3306:3306"
    volumes:
      - vol-wp-db:/var/lib/mysql
    networks:
      - backend

  wordpress:
    depends_on:
      - db
    networks:
      - backend
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: db
    build: ./
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./wp-content:/var/www/wp-content
      - ./images:/usr/src/wordpress/images
      - ./rootfs:/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=backend"
      - "traefik.http.routers.wordpresscp.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.wordpresscp.entrypoints=web"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.wordpresscp.middlewares=redirect-to-https@docker"
      - "traefik.http.routers.wordpresscp-secured.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.wordpresscp-secured.entrypoints=web-secure"
      - "traefik.http.routers.wordpresscp-secured.tls=true"
      - "traefik.http.routers.wordpresscp-secured.tls.certresolver=myhttpchallenge"
      - "traefik.http.services.wordpresscp.loadbalancer.server.port=8080"
