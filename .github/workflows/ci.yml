name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

env:
  ACTIONLINT_VERSION: 1.7.8
  ACTIONLINT_SHA256: be92c2652ab7b6d08425428797ceabeb16e31a781c07bc388456b4e592f3e36a
  IMAGE_NAME: wordpress
  TRIVY_VERSION: v0.69.3

jobs:
  validate:
    name: Validate Workflows And Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read WordPress version
        run: scripts/read-wp-version.sh Dockerfile

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSLo "/tmp/${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
          echo "${ACTIONLINT_SHA256}  /tmp/${archive}" | sha256sum -c -
          tar -xzf "/tmp/${archive}" -C /tmp actionlint
          sudo install /tmp/actionlint /usr/local/bin/actionlint

      - name: Lint GitHub Actions
        run: actionlint

      - name: Parse workflow YAML
        run: |
          ruby -e 'require "yaml"; YAML.load_file(".github/workflows/ci.yml"); YAML.load_file(".github/workflows/release.yml")'

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: config
          hide-progress: true
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          version: ${{ env.TRIVY_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image locally
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          hide-progress: true
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          version: ${{ env.TRIVY_VERSION }}
