worker_processes auto;
pid /tmp/nginx.pid;
worker_rlimit_nofile 51200;
pcre_jit on;
error_log /dev/stderr notice;

events {
    use epoll;
    worker_connections  4096;
    multi_accept on;
}

http {
    include mime.types;
    default_type application/octet-stream;
    server_names_hash_bucket_size 128;
    client_header_buffer_size 32k;
    large_client_header_buffers 4 32k;
    client_max_body_size 1024m;
    client_body_buffer_size 10m;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    server_tokens off;
    tcp_nodelay on;
    absolute_redirect off;
    # Cloudflare IPs
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/12;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 199.27.128.0/21;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    log_format  main_timed  '$remote_addr - $remote_user [$time_local] "$request" '
                            '$status $body_bytes_sent "$http_referer" '
                            '"$http_user_agent" "$http_x_forwarded_for" '
                            '$request_time $upstream_response_time $pipe $upstream_cache_status';

    access_log /dev/stdout main_timed;
    error_log /dev/stderr notice;
    limit_req_zone $binary_remote_addr zone=wp_login:10m rate=10r/m;
    limit_req_status 429;

    # FastCGI Cache Configuration
    fastcgi_cache_path /tmp/nginx_cache levels=1:2 keys_zone=WORDPRESS:50m inactive=60m max_size=256m;
    fastcgi_cache_key "$scheme$request_method$host$request_uri";
    fastcgi_cache_use_stale error timeout invalid_header http_500 http_503;

    gzip on;
    gzip_buffers 16 8k;
    gzip_comp_level 6;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
      text/xml application/xml application/atom+xml application/rss+xml application/xhtml+xml image/svg+xml
      text/javascript application/javascript application/x-javascript
      text/x-json application/json application/x-web-app-manifest+json
      text/css text/plain text/x-component
      font/opentype application/x-font-ttf application/vnd.ms-fontobject
      image/x-icon;
    gzip_disable "MSIE [1-6]\.(?!.*SV1)";

    server {
        listen [::]:8080 default_server;
        listen 8080 default_server;
        server_name _;

        # Cache bypass rules
        set $skip_cache 0;

        # POST requests and URLs with a query string should always bypass
        if ($request_method = POST) {
            set $skip_cache 1;
        }
        if ($query_string != "") {
            set $skip_cache 1;
        }

        # Don't cache URI containing admin, login, or XML-RPC
        if ($request_uri ~* "/wp-admin/|/xmlrpc.php|wp-.*.php|/feed/|index.php|sitemap(_index)?.xml") {
            set $skip_cache 1;
        }

        # Don't cache cookie-driven personalized traffic.
        if ($http_cookie ~* "comment_author|wordpress_[a-f0-9]+|wordpress_logged_in|wp-postpass|wordpress_no_cache|woocommerce_|wp_woocommerce_session_|edd_items_in_cart|edd_cart|PHPSESSID|jetpack[_a-z_]*|yith_wcwl|pll_language|wp-wpml_|wpm_language|wcml_client_currency|bookly[_a-z_]*|memberpress|mepr_|learnpress|learndash") {
            set $skip_cache 1;
        }

        sendfile off;

        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_temp_path /tmp/proxy_temp;
        client_body_temp_path /tmp/client_temp;
        fastcgi_temp_path /tmp/fastcgi_temp;
        uwsgi_temp_path /tmp/uwsgi_temp;
        scgi_temp_path /tmp/scgi_temp;

        client_max_body_size 50m;
        client_body_buffer_size 128k;

        root /usr/src/wordpress;
        index index.php;
        include /etc/nginx/includes/*.conf;

        location ~* ^/(wp-content)/(.*?)\.(zip|gz|tar|bzip2|7z)$ { deny all; }
        location ~ /(\.DS_Store|wp-config.php|wp-config-sample.php|readme.html.gz|readme.txt.gz|readme.html|readme.txt|error_log|license.txt|changelog|changelog.txt) { access_log off; log_not_found off; deny all; }
        location = /favicon.ico { access_log off; log_not_found off; expires 30d; }
        location ~ ~$           { access_log off; log_not_found off; deny all; }
        location /robots.txt { add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0"; expires -1; }
        location /wp-cron.php { add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0"; expires -1; }
        location ~ /(.*?/)?debug\.log$ { access_log off; deny all; }

        location /wp-content {
            root /var/www;
            expires 7d;
            add_header Cache-Control "public";
        }

        location ~* ^/wp-content/.*\.(?:css|js|jpg|jpeg|gif|png|svg|webp|avif|ico|woff|woff2|ttf|otf)$ {
            root /var/www;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
        }

        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ [^/]\.php(/|$) {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_connect_timeout 10;
            fastcgi_send_timeout 60;
            fastcgi_read_timeout 60;
            fastcgi_buffer_size 64k;
            fastcgi_buffers 4 64k;
            fastcgi_busy_buffers_size 128k;
            fastcgi_temp_file_write_size 128k;
            fastcgi_keep_conn on;
            fastcgi_intercept_errors on;

            fastcgi_index index.php;
            fastcgi_pass 127.0.0.1:9000;

            # Preserve Basic Auth for WordPress Application Passwords and MCP.
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;

            # FastCGI Caching rules
            fastcgi_cache WORDPRESS;
            fastcgi_cache_valid 200 301 302 5m;
            fastcgi_cache_bypass $skip_cache;
            fastcgi_no_cache $skip_cache;
            add_header X-FastCGI-Cache $upstream_cache_status;
        }
    }
}
